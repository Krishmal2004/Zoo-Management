# Local MongoDB for development when Atlas IP whitelist is a problem.
# From repo root: docker compose up -d
# backend/.env: MONGODB_URI=mongodb://127.0.0.1:27017/zoo_management
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - zoo_mongo_data:/data/db

volumes:
  zoo_mongo_data:
